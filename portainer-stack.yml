version: '3.8'

services:
  drachtio_server:
    image: drachtio/drachtio-server:latest
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "9022:9022"
    environment:
      DRACHTIO_SECRET: cymru
      DRACHTIO_LOGLEVEL: info
      DRACHTIO_CONTACTS: "sip:*;transport=udp,tcp"
    networks:
      - bridge_net
    restart: always

  gemini_bridge:
    image: node:20-alpine
    working_dir: /app
    # Se construye a sí mismo al arrancar clonando el repo
    # Requiere la variable GIT_TOKEN en Portainer
    command: >
      sh -c "apk add --no-cache git &&
             rm -rf /temp_code &&
             git clone https://$${GIT_TOKEN}@github.com/aromeroconde/gemini-sip-bridge.git /temp_code &&
             cp -a /temp_code/. /app/ &&
             rm -rf /temp_code &&
             npm install --include=dev &&
             npx tsc &&
             node dist/index.js"
    network_mode: host
    environment:
      NODE_ENV: production
      GIT_TOKEN: ${GIT_TOKEN}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-live-preview}
      VOICE_NAME: ${VOICE_NAME:-Zephyr}
      VOICE_PROMPT: ${VOICE_PROMPT:-Eres QuantumIA, el consultor de IA de élite. Responde de forma profesional, amable y concisa. Habla siempre en español de Colombia.}
      DRACHTIO_HOST: 127.0.0.1
      DRACHTIO_PORT: "9022"
      DRACHTIO_SECRET: cymru
      BRIDGE_WS_URL: ws://127.0.0.1:3001/sip-bridge
      SIP_EXTERNAL_IP: ${SIP_EXTERNAL_IP:-5.189.166.241}
      WEBHOOK_URL: ${WEBHOOK_URL}
      REPORT_WEBHOOK_URL: ${REPORT_WEBHOOK_URL}
      SIP_OUTBOUND_PROXY: ${SIP_OUTBOUND_PROXY}
      SIP_USER: ${SIP_USER}
      SIP_PASSWORD: ${SIP_PASSWORD}
    restart: always

networks:
  bridge_net:
    driver: overlay
    attachable: true
