version: '3.8'

services:
  gemini_bridge:
    image: node:20-slim
    working_dir: /app
    command: >
      sh -c "apt-get update && apt-get install -y git python3 make g++ &&
             rm -rf /temp_code &&
             git clone https://$${GIT_TOKEN}@github.com/aromeroconde/gemini-sip-bridge.git /temp_code &&
             cp -a /temp_code/. /app/ &&
             rm -rf /temp_code &&
             npm install --include=dev &&
             rm -rf dist &&
             npx tsc &&
             node dist/agent.js dev --url $${LIVEKIT_URL} --api-key $${LIVEKIT_API_KEY} --api-secret $${LIVEKIT_API_SECRET}"
    environment:
      NODE_ENV: production
      GIT_TOKEN: ${GIT_TOKEN}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-live-preview}
      VOICE_NAME: ${VOICE_NAME:-Zephyr}
      VOICE_PROMPT: ${VOICE_PROMPT:-Eres QuantumIA, el consultor de IA de élite. Responde de forma profesional, amable y concisa. Habla siempre en español de Colombia.}
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      WEBHOOK_URL: ${WEBHOOK_URL}
      REPORT_WEBHOOK_URL: ${REPORT_WEBHOOK_URL}
    restart: always
