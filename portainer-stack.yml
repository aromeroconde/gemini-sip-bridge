version: '3.8'

services:
  gemini_bridge:
    image: ghcr.io/aromeroconde/gemini-sip-bridge:latest
    environment:
      NODE_ENV: production
      GIT_TOKEN: ${GIT_TOKEN}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-live-preview}
      VOICE_NAME: ${VOICE_NAME:-Zephyr}
      VOICE_PROMPT: ${VOICE_PROMPT:-Eres QuantumIA, el consultor de IA de élite. Responde de forma profesional, amable y concisa. Habla siempre en español de Colombia.}
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      WEBHOOK_URL: ${WEBHOOK_URL}
      REPORT_WEBHOOK_URL: ${REPORT_WEBHOOK_URL}
    restart: always
