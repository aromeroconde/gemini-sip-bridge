version: '3.8'

services:
  # SIP Server (Drachtio) - uses host network for correct SIP headers
  drachtio_server:
    image: drachtio/drachtio-server:latest
    network_mode: host
    environment:
      DRACHTIO_SECRET: cymru
      DRACHTIO_LOGLEVEL: info
    restart: always

  # Gemini SIP Bridge
  gemini_bridge:
    image: aromeroconde/gemini-sip-bridge:latest
    network_mode: host
    environment:
      NODE_ENV: production
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-live-preview}
      VOICE_NAME: ${VOICE_NAME:-Zephyr}
      VOICE_PROMPT: ${VOICE_PROMPT:-Eres QuantumIA, el consultor de IA de élite. Responde de forma profesional, amable y concisa. Habla siempre en español de Colombia.}
      DRACHTIO_HOST: 127.0.0.1
      DRACHTIO_PORT: "9022"
      DRACHTIO_SECRET: cymru
      BRIDGE_WS_URL: ws://localhost:3001/sip-bridge
      SIP_EXTERNAL_IP: ${SIP_EXTERNAL_IP:-5.189.166.241}
      WEBHOOK_URL: ${WEBHOOK_URL}
      REPORT_WEBHOOK_URL: ${REPORT_WEBHOOK_URL}
      SIP_OUTBOUND_PROXY: ${SIP_OUTBOUND_PROXY}
      SIP_USER: ${SIP_USER}
      SIP_PASSWORD: ${SIP_PASSWORD}
    restart: always

