services:
  # SIP Server (Drachtio) - uses host network for correct SIP headers
  drachtio_server:
    image: drachtio/drachtio-server:latest
    container_name: drachtio_server
    network_mode: host
    environment:
      DRACHTIO_SECRET: cymru
      DRACHTIO_LOGLEVEL: info
    restart: always

  # Gemini SIP Bridge
  gemini_bridge:
    image: gemini-bridge:latest
    container_name: gemini_bridge
    network_mode: host
    environment:
      NODE_ENV: production
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-models/gemini-2.0-flash-exp}
      VOICE_NAME: ${VOICE_NAME:-Puck}
      VOICE_PROMPT: ${VOICE_PROMPT:-Eres QuantumIA, el consultor de IA de élite. Responde de forma profesional, amable y concisa. Habla siempre en español de Colombia.}
      DRACHTIO_HOST: 127.0.0.1
      DRACHTIO_PORT: "9022"
      DRACHTIO_SECRET: cymru
      BRIDGE_WS_URL: ws://localhost:3001/sip-bridge
      SIP_EXTERNAL_IP: 5.189.166.241
      WEBHOOK_URL: ${WEBHOOK_URL}
    restart: always
