version: '3.8'

services:
  drachtio_server:
    image: drachtio/drachtio-server:latest
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "9022:9022"
    environment:
      DRACHTIO_SECRET: cymru
      DRACHTIO_LOGLEVEL: info
      DRACHTIO_CONTACTS: "sip:*;transport=udp,tcp"
    networks:
      - bridge_net
    restart: always

  gemini_bridge:
    image: node:20-alpine
    working_dir: /app
    command: >
      sh -c "apk add --no-cache git &&
             rm -rf /temp_code &&
             git clone https://$${GIT_TOKEN}@github.com/aromeroconde/gemini-sip-bridge.git /temp_code &&
             cp -a /temp_code/. /app/ &&
             rm -rf /temp_code &&
             npm install --include=dev &&
             npx tsc &&
             node dist/index.js"
    environment:
      NODE_ENV: production
      GIT_TOKEN: ${GIT_TOKEN}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-live-preview}
      VOICE_NAME: ${VOICE_NAME:-Zephyr}
      VOICE_PROMPT: ${VOICE_PROMPT:-Eres QuantumIA, el consultor de IA de élite. Responde de forma profesional, amable y concisa. Habla siempre en español de Colombia.}
      DRACHTIO_HOST: drachtio_server
      DRACHTIO_PORT: "9022"
      DRACHTIO_SECRET: cymru
      BRIDGE_WS_URL: ws://gemini_bridge:3001/sip-bridge
      SIP_EXTERNAL_IP: ${SIP_EXTERNAL_IP:-5.189.166.241}
      WEBHOOK_URL: ${WEBHOOK_URL}
      REPORT_WEBHOOK_URL: ${REPORT_WEBHOOK_URL}
      SIP_OUTBOUND_PROXY: ${SIP_OUTBOUND_PROXY}
      SIP_USER: ${SIP_USER}
      SIP_PASSWORD: ${SIP_PASSWORD}
    ports:
      - target: 3001
        published: 3001
        protocol: tcp
        mode: host
      - target: 10000
        published: 10000
        protocol: udp
        mode: host
      - target: 10001
        published: 10001
        protocol: udp
        mode: host
      - target: 10002
        published: 10002
        protocol: udp
        mode: host
      - target: 10003
        published: 10003
        protocol: udp
        mode: host
      - target: 10004
        published: 10004
        protocol: udp
        mode: host
      - target: 10005
        published: 10005
        protocol: udp
        mode: host
      - target: 10006
        published: 10006
        protocol: udp
        mode: host
      - target: 10007
        published: 10007
        protocol: udp
        mode: host
      - target: 10008
        published: 10008
        protocol: udp
        mode: host
      - target: 10009
        published: 10009
        protocol: udp
        mode: host
      - target: 10010
        published: 10010
        protocol: udp
        mode: host
      - target: 10011
        published: 10011
        protocol: udp
        mode: host
      - target: 10012
        published: 10012
        protocol: udp
        mode: host
      - target: 10013
        published: 10013
        protocol: udp
        mode: host
      - target: 10014
        published: 10014
        protocol: udp
        mode: host
      - target: 10015
        published: 10015
        protocol: udp
        mode: host
      - target: 10016
        published: 10016
